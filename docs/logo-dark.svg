<svg viewBox="0 0 360 90" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Old chassis — heavy, dimmed -->
  <rect x="8" y="14" width="64" height="17" rx="2.5" stroke="#4a4e5c" stroke-width="2"/>
  <rect x="14" y="19" width="4.5" height="7" rx="0.5" fill="#4a4e5c" opacity="0.25"/>
  <rect x="20.5" y="19" width="4.5" height="7" rx="0.5" fill="#4a4e5c" opacity="0.25"/>
  <rect x="27" y="19" width="4.5" height="7" rx="0.5" fill="#4a4e5c" opacity="0.25"/>
  <rect x="33.5" y="19" width="4.5" height="7" rx="0.5" fill="#4a4e5c" opacity="0.25"/>
  <rect x="40" y="19" width="4.5" height="7" rx="0.5" fill="#4a4e5c" opacity="0.25"/>
  <rect x="46.5" y="19" width="4.5" height="7" rx="0.5" fill="#4a4e5c" opacity="0.25"/>
  <rect x="53" y="19" width="4.5" height="7" rx="0.5" fill="#4a4e5c" opacity="0.25"/>
  <rect x="59.5" y="19" width="4.5" height="7" rx="0.5" fill="#4a4e5c" opacity="0.25"/>

  <!-- Thick migration indicator -->
  <rect x="34" y="35" width="12" height="3" rx="1.5" fill="#f0b429"/>
  <path d="M40 38v5m-3-2l3 2.5 3-2.5" stroke="#f0b429" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- New chassis — heavy, bright -->
  <rect x="8" y="50" width="64" height="17" rx="2.5" stroke="#00b4d8" stroke-width="2"/>
  <rect x="14" y="55" width="4.5" height="7" rx="0.5" fill="#00b4d8" opacity="0.4"/>
  <rect x="20.5" y="55" width="4.5" height="7" rx="0.5" fill="#00b4d8" opacity="0.4"/>
  <rect x="27" y="55" width="4.5" height="7" rx="0.5" fill="#00b4d8" opacity="0.4"/>
  <rect x="33.5" y="55" width="4.5" height="7" rx="0.5" fill="#00b4d8" opacity="0.4"/>
  <rect x="40" y="55" width="4.5" height="7" rx="0.5" fill="#00b4d8" opacity="0.4"/>
  <rect x="46.5" y="55" width="4.5" height="7" rx="0.5" fill="#00b4d8" opacity="0.4"/>
  <rect x="53" y="55" width="4.5" height="7" rx="0.5" fill="#00b4d8" opacity="0.4"/>
  <rect x="59.5" y="55" width="4.5" height="7" rx="0.5" fill="#00b4d8" opacity="0.4"/>
  <!-- Power LED -->
  <circle cx="68" cy="53" r="1.5" fill="#28a745"/>

  <!-- Wordmark — ultra bold wide -->
  <text x="90" y="31" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="900" fill="#cdd0d8" letter-spacing="3">TRM</text>
  <text x="90" y="58" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="900" fill="#00b4d8" letter-spacing="3">COMPARE</text>
  <line x1="90" y1="63" x2="260" y2="63" stroke="#00b4d8" stroke-width="1" opacity="0.25"/>
  <text x="90" y="74" font-family="ui-monospace, 'Cascadia Mono', 'Courier New', monospace" font-size="7" font-weight="600" fill="#6b7084" letter-spacing="3">MIGRATION AUDIT</text>
</svg>
